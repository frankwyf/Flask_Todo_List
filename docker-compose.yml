services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///instance/app.db
    volumes:
      - app-data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
