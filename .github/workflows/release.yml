name: release-artifact

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r tests/requirements.txt
          python -m pip install -r requirements-dev.txt
          python -m pytest --cov=app --cov-fail-under=80 -q

      - name: Build source archive
        run: |
          ARCHIVE_NAME=flask-todo-list-${GITHUB_REF_NAME:-manual}-${GITHUB_SHA::7}.zip
          git archive --format=zip --output "$ARCHIVE_NAME" HEAD
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t flask-todo-list:${{ github.ref_name }} .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: ${{ env.ARCHIVE_NAME }}

  docker-publish:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
