name: quality-pipeline

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            tests/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r tests/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint check
        run: python -m ruff check app tests run.py db_create.py

      - name: Python compile sanity check
        run: python -m compileall app run.py db_create.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            tests/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r tests/requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=term --cov-report=xml --cov-fail-under=80 -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  security:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install scanner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: Run dependency vulnerability scan
        run: python -m pip_audit -r requirements.txt --progress-spinner off -f json -o pip-audit-report.json

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t flask-todo-list:ci .

      - name: Start container and smoke test
        run: |
          docker run -d --name flask-todo-smoke -p 5000:5000 \
            -e APP_ENV=testing -e SECRET_KEY=ci-test flask-todo-list:ci
          sleep 5
          curl -f http://localhost:5000/ || exit 1
          docker stop flask-todo-smoke
